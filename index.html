<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可转债日报</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Noto Sans CJK SC", "PingFang SC", "WenQuanYi Micro Hei", "Microsoft YaHei", sans-serif;
  background: #F1F2F6;
  color: #2D3436;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 750px;
  margin: 0 auto;
  padding: 30px 24px 60px;
}
.header {
  text-align: center;
  margin-bottom: 24px;
}
.title {
  font-family: "Segoe Script", "Palatino Linotype", Georgia, serif;
  font-size: 34px;
  font-style: italic;
  font-weight: bold;
  color: #8250DF;
}
.title-divider {
  width: 80px;
  height: 2px;
  background: #8250DF;
  margin: 8px auto 4px;
}
.info-line {
  font-size: 14px;
  color: #636E72;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.freshness-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
}
.update-time {
  font-size: 12px;
  color: #B2BEC3;
}
.next-update {
  font-size: 11px;
  color: #B2BEC3;
  margin-top: 4px;
}
.module {
  margin-bottom: 24px;
}
.module-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
  height: 36px;
}
.module-title-text {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #2D3436;
}
.module-title-text::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 28px;
  background: #8250DF;
  border-radius: 2px;
}
.module-subtitle {
  font-size: 14px;
  color: #636E72;
}
.market-card {
  background: #FFFFFF;
  border: 1px solid #E8E8E8;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
}
.market-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.market-row {
  display: flex;
  align-items: baseline;
  font-size: 15px;
}
.market-label {
  color: #2D3436;
  white-space: nowrap;
}
.market-value {
  font-family: "DejaVu Sans Mono", "Consolas", monospace;
  font-size: 17px;
  font-weight: bold;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: #FFFFFF;
  border: 1px solid #E8E8E8;
  font-size: 13px;
}
.table-wrapper {
  border: 1px solid #E8E8E8;
  border-radius: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: #FFFFFF;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.table-wrapper::-webkit-scrollbar {
  display: none;
}
.data-table thead {
  background: #8250DF;
}
.data-table th {
  color: #FFFFFF;
  font-size: 13px;
  font-weight: bold;
  padding: 7px 4px;
  text-align: center;
  white-space: nowrap;
}
.data-table td {
  padding: 5px 4px;
  border-bottom: 1px solid #E0E0E0;
}
.data-table tr.alt-row td {
  background: #F8F9FA;
}
.data-table tr:last-child td {
  border-bottom: none;
}
.text-center { text-align: center; }
.text-left { text-align: left; padding-left: 8px; }
.mono {
  font-family: "DejaVu Sans Mono", "Consolas", monospace;
}
.bar-container {
  position: absolute;
  bottom: 2px;
  left: 4px;
  right: 4px;
  height: 4px;
  background: #FFFFFF;
  border-radius: 2px;
  overflow: hidden;
}
.data-table td:not([style*="position:sticky"]) {
  position: relative;
}
.bar-container.bidi {
  display: flex;
  justify-content: center;
}
.bar-fill {
  height: 100%;
  border-radius: 2px;
}
.bar-right {
  height: 100%;
  position: absolute;
  left: 50%;
  border-radius: 0 2px 2px 0;
}
.bar-left {
  height: 100%;
  position: absolute;
  right: 50%;
  border-radius: 2px 0 0 2px;
}
.disclaimer {
  text-align: center;
  font-size: 11px;
  color: #8250DF;
  margin-top: 20px;
}
.update-info {
  text-align: center;
  font-size: 12px;
  color: #B2BEC3;
  margin-top: 8px;
}
@media (max-width: 600px) {
  .container { padding: 14px 10px 32px; }
  .title { font-size: 21px; }
  .title-divider { width: 60px; margin: 6px auto 4px; }
  .info-line { font-size: 12px; gap: 5px; }
  .freshness-badge { padding: 2px 8px; font-size: 11px; }
  .update-time { font-size: 11px; }
  .next-update { font-size: 10px; margin-top: 3px; }
  .module { margin-bottom: 16px; }
  .module-title { height: auto; min-height: 30px; margin-bottom: 5px; flex-wrap: wrap; gap: 4px; }
  .module-title-text { font-size: 16px; gap: 6px; }
  .module-title-text::before { width: 3px; height: 22px; }
  .module-subtitle { font-size: 11px; width: 100%; text-align: left; }
  .market-card {
    flex-direction: column;
    padding: 12px;
    gap: 10px;
  }
  .market-row { font-size: 13px; }
  .market-value { font-size: 15px; }
  .data-table { font-size: 11px; min-width: 480px; }
  .data-table th { padding: 5px 3px; font-size: 11px; }
  .data-table td { padding: 4px 3px; }
  .bar-container { left: 3px; right: 3px; height: 3px; }
  .disclaimer { font-size: 10px; margin-top: 14px; }
  .update-info { font-size: 10px; }
}
@media (max-width: 380px) {
  .container { padding: 10px 8px 28px; }
  .title { font-size: 19px; }
  .market-row { font-size: 12px; }
  .market-value { font-size: 14px; }
  .module-title-text { font-size: 15px; }
}
.loading {
  text-align: center;
  padding: 60px 20px;
  color: #B2BEC3;
  font-size: 16px;
}
.error-msg {
  text-align: center;
  padding: 40px 20px;
  color: #FF4757;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <div id="app"><div class="loading">正在加载数据...</div></div>
</div>

<script>
(function() {
  'use strict';

  // === 颜色常量 ===
  var COLOR = {
    TEXT_DARK: '#2D3436',
    TEXT_MEDIUM: '#636E72',
    TEXT_LIGHT: '#B2BEC3',
    RED: '#FF4757',
    GREEN: '#2ED573',
    GOLD: '#FDCB6E',
    GOLD_BG: '#FFFFFF',
    PURPLE: '#8250DF',
    CARD_BG: '#FFFFFF',
    CARD_BORDER: '#E8E8E8',
    SEPARATOR: '#E0E0E0',
    TABLE_HEADER_BG: '#8250DF',
    TABLE_ROW_ALT: '#F8F9FA'
  };

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // === 渲染表格 ===
  function renderTable(tableData, colWidths, stickyCount) {
    stickyCount = stickyCount || 1;
    var colLabels = tableData.colLabels;
    var rows = tableData.rows;
    var barColIndices = tableData.barColIndices || [];
    var changePctCol = tableData.changePctCol;

    // 计算 bar 最大值
    var maxBarValues = {};
    for (var bi = 0; bi < barColIndices.length; bi++) {
      var barIdx = barColIndices[bi];
      var label = colLabels[barIdx] || '';
      var isBidi = label.indexOf('涨幅中位数') >= 0;
      var maxVal = 0;
      for (var r = 0; r < rows.length; r++) {
        var vs = rows[r][barIdx];
        if (vs === '-' || vs === '') continue;
        var nv = parseFloat(String(vs).replace('%', ''));
        if (!isNaN(nv)) maxVal = Math.max(maxVal, isBidi ? Math.abs(nv) : nv);
      }
      maxBarValues[barIdx] = maxVal || 1;
    }

    // 冻结列固定宽度
    var frozenWidths = [];
    for (var i = 0; i < stickyCount; i++) {
      var name = colLabels[i] || '';
      if (name === '排名') frozenWidths.push(36);
      else frozenWidths.push(0);
    }
    var leftOffsets = [];
    var acc = 0;
    for (var i2 = 0; i2 < stickyCount; i2++) {
      leftOffsets.push(acc);
      acc += frozenWidths[i2];
    }

    var html = '<div class="table-wrapper"><table class="data-table">';
    // 表头
    html += '<thead><tr>';
    for (var i3 = 0; i3 < colLabels.length; i3++) {
      var isSticky = i3 < stickyCount;
      var sParts = [];
      if (isSticky) {
        sParts.push('position:sticky', 'left:' + leftOffsets[i3] + 'px', 'z-index:3', 'background:' + COLOR.TABLE_HEADER_BG);
        if (frozenWidths[i3] > 0) {
          sParts.push('width:' + frozenWidths[i3] + 'px', 'min-width:' + frozenWidths[i3] + 'px');
        }
        sParts.push('white-space:nowrap');
      } else {
        var w = colWidths ? colWidths[i3] * 100 : (100 / colLabels.length);
        sParts.push('width:' + w.toFixed(1) + '%');
      }
      html += '<th style="' + sParts.join(';') + '">' + esc(colLabels[i3]) + '</th>';
    }
    html += '</tr></thead><tbody>';

    // 表体
    for (var r2 = 0; r2 < rows.length; r2++) {
      var row = rows[r2];
      var isAltRow = r2 % 2 === 1;
      var rowBg = isAltRow ? COLOR.TABLE_ROW_ALT : COLOR.CARD_BG;
      html += '<tr class="' + (isAltRow ? 'alt-row' : '') + '">';
      for (var c = 0; c < colLabels.length; c++) {
        var val = String(row[c] != null ? row[c] : '');
        var colName = colLabels[c] || '';
        var isNumeric = /^[-]?[\d,]+\.?\d*%?$/.test(val.trim());
        var centerCols = ['排名', '涨幅', '价格', '成交额(亿)', '可转债',
          '行业一级', '行业二级', '剩余规模', '到期日期',
          '涨幅中位数', '成交额中位数(亿)', '价格区间', '数量', '上涨', '下跌'];
        var isCenter = !isNumeric || centerCols.indexOf(colName) >= 0;

        var textColor = COLOR.TEXT_DARK;
        var fontWeight = 'normal';
        if (c === changePctCol || colName === '涨幅') {
          var numVal = parseFloat(String(val).replace('%', ''));
          if (!isNaN(numVal)) {
            if (numVal > 0) { textColor = COLOR.RED; fontWeight = 'bold'; }
            else if (numVal < 0) { textColor = COLOR.GREEN; fontWeight = 'bold'; }
          }
        }
        if (colName === '涨幅中位数') {
          textColor = COLOR.TEXT_DARK;
          fontWeight = 'normal';
        }

        var isMono = isNumeric || /^[\d.%\-]+$/.test(val.trim());
        var fontClass = isMono ? 'mono' : '';

        // bar 渲染
        var barHtml = '';
        if (barColIndices.indexOf(c) >= 0) {
          if (val !== '-' && val !== '') {
            var rawNum = parseFloat(String(val).replace('%', ''));
            if (!isNaN(rawNum)) {
              var isBidi2 = colName.indexOf('涨幅中位数') >= 0;
              if (!isBidi2 && rawNum <= 0) {
                // skip
              } else {
                var maxVal2 = maxBarValues[c] || 1;
                if (isBidi2) {
                  var ratio = Math.min(Math.abs(rawNum) / maxVal2, 1);
                  var barW = 45 * ratio;
                  if (rawNum >= 0) {
                    barHtml = '<div class="bar-container bidi"><div class="bar-right" style="width:' + barW + '%;background:' + COLOR.RED + '"></div></div>';
                  } else {
                    barHtml = '<div class="bar-container bidi"><div class="bar-left" style="width:' + barW + '%;background:' + COLOR.GREEN + '"></div></div>';
                  }
                } else {
                  var ratio2 = Math.min(rawNum / maxVal2, 1);
                  var barW2 = 90 * ratio2;
                  barHtml = '<div class="bar-container"><div class="bar-fill" style="width:' + barW2 + '%;background:' + COLOR.GOLD + '"></div></div>';
                }
              }
            }
          }
        }

        var alignClass = isCenter ? 'text-center' : 'text-left';
        var isSticky2 = c < stickyCount;
        var sParts2 = ['color:' + textColor, 'font-weight:' + fontWeight, 'white-space:nowrap'];
        if (isSticky2) {
          sParts2.push('position:sticky', 'left:' + leftOffsets[c] + 'px', 'z-index:2', 'background:' + rowBg);
          if (frozenWidths[c] > 0) {
            sParts2.push('width:' + frozenWidths[c] + 'px', 'min-width:' + frozenWidths[c] + 'px');
          }
        }
        html += '<td class="' + alignClass + ' ' + fontClass + '" style="' + sParts2.join(';') + '">' + esc(val) + barHtml + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  // === 渲染市场卡片 ===
  function renderMarketCard(m) {
    var html = '<div class="market-card">';
    html += '<div class="market-col">';
    html += '<div class="market-row"><span class="market-label">上涨：</span><span class="market-value" style="color:' + COLOR.RED + '">' + esc(m.up) + '</span></div>';
    html += '<div class="market-row"><span class="market-label">下跌：</span><span class="market-value" style="color:' + COLOR.GREEN + '">' + esc(m.down) + '</span></div>';
    html += '<div class="market-row"><span class="market-label">平盘：</span><span class="market-value" style="color:' + COLOR.TEXT_DARK + '">' + esc(m.flat) + '</span></div>';
    html += '</div>';
    html += '<div class="market-col">';
    html += '<div class="market-row"><span class="market-label">总成交额：</span><span class="market-value" style="color:' + COLOR.PURPLE + '">' + esc(m.totalAmount) + '</span></div>';
    html += '<div class="market-row"><span class="market-label">涨幅前十：</span><span class="market-value" style="color:' + COLOR.PURPLE + '">' + esc(m.top10Gain) + '(' + esc(m.top10GainPct) + ')</span></div>';
    html += '<div class="market-row"><span class="market-label">涨幅前二十：</span><span class="market-value" style="color:' + COLOR.PURPLE + '">' + esc(m.top20Gain) + '(' + esc(m.top20GainPct) + ')</span></div>';
    html += '</div>';
    html += '<div class="market-col">';
    html += '<div class="market-row"><span class="market-label">价格中位数：</span><span class="market-value" style="color:' + COLOR.PURPLE + '">' + esc(m.priceMedian) + '</span></div>';
    var gainMedianColor = COLOR.TEXT_DARK;
    var gainNum = parseFloat(String(m.gainMedian).replace('%', ''));
    if (!isNaN(gainNum)) {
      if (gainNum > 0) gainMedianColor = COLOR.RED;
      else if (gainNum < 0) gainMedianColor = COLOR.GREEN;
    }
    html += '<div class="market-row"><span class="market-label">涨幅中位数：</span><span class="market-value" style="color:' + gainMedianColor + '">' + esc(m.gainMedian) + '</span></div>';
    html += '<div class="market-row"><span class="market-label">成交额中位数：</span><span class="market-value" style="color:' + COLOR.PURPLE + '">' + esc(m.amountMedian) + '</span></div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  // === 渲染新鲜度标签 ===
  function renderFreshness(tradeDate) {
    var now = new Date();
    var todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
    var tradeDateObj = new Date(tradeDate + 'T00:00:00');
    var todayObj = new Date(todayStr + 'T00:00:00');
    var dayDiff = Math.round((todayObj - tradeDateObj) / (1000 * 60 * 60 * 24));

    var freshnessLabel, freshnessColor, freshnessBg;
    if (dayDiff === 0) {
      freshnessLabel = '今日数据'; freshnessColor = '#155724'; freshnessBg = '#d4edda';
    } else if (dayDiff === 1) {
      freshnessLabel = '昨日数据'; freshnessColor = '#856404'; freshnessBg = '#fff3cd';
    } else if (dayDiff >= 2 && dayDiff <= 3) {
      freshnessLabel = dayDiff + '日前数据'; freshnessColor = '#856404'; freshnessBg = '#ffe8a3';
    } else {
      freshnessLabel = dayDiff + '日前数据'; freshnessColor = '#721c24'; freshnessBg = '#f8d7da';
    }
    return '<span class="freshness-badge" style="color:' + freshnessColor + ';background:' + freshnessBg + '">' + freshnessLabel + '</span>';
  }

  // === 主渲染 ===
  function renderPage(data) {
    var nowStr = data.generateTime;
    var html = '';

    // Header
    html += '<div class="header">';
    html += '<div class="title">Study Convertible Bond Everyday</div>';
    html += '<div class="title-divider"></div>';
    html += '<div class="info-line">';
    html += renderFreshness(data.tradeDate);
    html += '<span>数据日期: ' + esc(data.tradeDate) + '</span>';
    html += '<span class="update-time">| 页面更新: ' + esc(nowStr) + '</span>';
    html += '</div>';
    html += '<div class="next-update">下次自动更新: 工作日 15:15 (北京时间) | 由 CloudBase 云函数自动生成</div>';
    html += '</div>';

    // 市场概况
    html += '<div class="module">';
    html += '<div class="module-title"><div class="module-title-text">市场概况</div></div>';
    html += renderMarketCard(data.market);
    html += '</div>';

    // 表格配置
    var distColWidths = [0.18, 0.10, 0.08, 0.08, 0.16, 0.20, 0.20];
    var top10ColWidths = [0.05, 0.12, 0.08, 0.10, 0.14, 0.13, 0.13, 0.13, 0.12];

    var tableConfigs = [
      { title: '价格分布统计', data: data.tables.priceDist, widths: distColWidths, sticky: 1, subtitle: null },
      { title: '行业分布统计', data: data.tables.industryDist, widths: distColWidths, sticky: 1, subtitle: null },
      { title: '涨幅TOP10', data: data.tables.topGainers, widths: top10ColWidths, sticky: 2, subtitle: data.tables.topGainers.subtitle },
      { title: '成交额TOP10', data: data.tables.topAmount, widths: top10ColWidths, sticky: 2, subtitle: data.tables.topAmount.subtitle },
      { title: '跌幅TOP10', data: data.tables.topLosers, widths: top10ColWidths, sticky: 2, subtitle: data.tables.topLosers.subtitle }
    ];

    for (var i = 0; i < tableConfigs.length; i++) {
      var cfg = tableConfigs[i];
      html += '<div class="module">';
      html += '<div class="module-title">';
      html += '<div class="module-title-text">' + esc(cfg.title) + '</div>';
      if (cfg.subtitle) {
        html += '<div class="module-subtitle">' + esc(cfg.subtitle) + '</div>';
      }
      html += '</div>';
      html += renderTable(cfg.data, cfg.widths, cfg.sticky);
      html += '</div>';
    }

    // Footer
    html += '<div class="disclaimer">免责声明：本图表来自公开数据源 仅整理供学习研究 不作为投资建议</div>';
    html += '<div class="update-info">共 ' + esc(data.bondCount) + ' 只可转债 | 数据自动更新中</div>';

    return html;
  }

  // === 加载数据 ===
  function loadData() {
    var ts = new Date().getTime();
    var url = 'data.json?t=' + ts;
    fetch(url)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        document.title = '可转债日报 - ' + data.tradeDate;
        document.getElementById('app').innerHTML = renderPage(data);
      })
      .catch(function(err) {
        document.getElementById('app').innerHTML = '<div class="error-msg">数据加载失败: ' + esc(err.message) + '<br>请稍后刷新重试</div>';
      });
  }

  loadData();
})();
</script>
</body>
</html>
